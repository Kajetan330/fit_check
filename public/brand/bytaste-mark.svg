<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-labelledby="t">
  <title id="t">BYTASTE mark - the editor's asterisk</title>
  <!-- Six spokes. Five in ink; the chosen one in claret. -->
  <g stroke-linecap="round">
    <!-- ink spokes -->
    <path d="M64 64 L64 18"  stroke="#1b1418" stroke-width="13"/>
    <path d="M64 64 L64 110" stroke="#1b1418" stroke-width="13"/>
    <path d="M64 64 L24.2 41" stroke="#1b1418" stroke-width="13"/>
    <path d="M64 64 L24.2 87" stroke="#1b1418" stroke-width="13"/>
    <path d="M64 64 L103.8 87" stroke="#1b1418" stroke-width="13"/>
    <!-- the chosen spoke -->
    <path d="M64 64 L103.8 41" stroke="#7c2237" stroke-width="13"/>
  </g>
  <circle cx="64" cy="64" r="9" fill="#1b1418"/>
</svg>
